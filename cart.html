<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Rocoraft shopping cart." />
  <title>Rocoraft | Cart</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    body { background: #0a1027; color: #f7fbff; margin: 0; }
  </style>
  <script src="./script.js" defer></script>
</head>
<body data-page="cart">
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="./index.html">Rocoraft</a>
      <button class="menu-toggle" aria-expanded="false" aria-controls="siteNav" aria-label="Open menu">
        <span aria-hidden="true">&#9776;</span>
      </button>
      <nav id="siteNav" class="site-nav">
        <a href="./index.html">Home</a>
        <a href="./books.html">Books</a>
        <a href="./labels.html">Labels</a>
        <a href="./cart.html" class="cart-link active">Cart <span class="cart-count">0</span></a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section container page-hero" data-reveal>
      <p class="eyebrow">Cart</p>
      <h1>Your Selected Ebooks</h1>
      <p>Update quantity, remove books, and proceed to checkout.</p>
    </section>

    <section class="section container cart-layout" data-reveal>
      <div>
        <div id="cartItems" class="cart-items"></div>
        <p id="cartEmpty" class="empty-state hidden">Your cart is empty. Start from the books page.</p>
      </div>

      <aside class="summary-card">
        <h2>Order Summary</h2>
        <div class="summary-row"><span>Subtotal</span><strong id="subtotalValue">$0.00</strong></div>
        <div class="summary-row"><span>Tax (10%)</span><strong id="taxValue">$0.00</strong></div>
        <div class="summary-row total"><span>Total</span><strong id="totalValue">$0.00</strong></div>

        <form id="checkoutForm" class="checkout-form">
          <label>
            Full Name
            <input type="text" name="name" required placeholder="Your name" />
          </label>
          <label>
            Email
            <input type="email" name="email" required placeholder="you@example.com" />
          </label>
          <button class="btn btn-primary" type="submit">Checkout Now</button>
        </form>
      </aside>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-shell">
      <p>Rocoraft <span data-year></span> All rights reserved.</p>
      <div class="footer-links">
        <a href="./books.html">Shop</a>
        <a href="./labels.html">Labels</a>
        <a href="./cart.html">Cart</a>
      </div>
    </div>
  </footer>
</body>
</html>
